name: Java CI - Maven

on:
  schedule:
    # Run every day at 13:00 UTC (GitHub Actions uses UTC for cron schedules).
    - cron: '0 13 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2-

      - name: Build and run tests
        run: mvn -B test

      - name: Upload surefire / testng reports (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            target/surefire-reports/**
            target/failsafe-reports/**
            test-output/**

      - name: Send test report via email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Test Report - ${{ github.repository }} - ${{ github.run_number }}"
          to: hariharana.ja@gmail.com
          from: ${{ secrets.EMAIL_USERNAME }}
          body: |
            Test execution completed for ${{ github.repository }}.
            
            Branch: ${{ github.ref }}
            Commit: ${{ github.sha }}
            Run ID: ${{ github.run_id }}
            
            Please check the attached test report.
          attachments: |
            target/surefire-reports/emailable-report.html
            test-output/emailable-report.html

